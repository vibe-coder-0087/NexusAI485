services:
  - type: web
    name: nexus-ai-backend
    runtime: python
    plan: free
    region: oregon

    # IMPORTANT: Path to your backend folder
    rootDir: NexusAI/backend

    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT

    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: FLASK_DEBUG
        value: "false"

      - key: AI_PROVIDER
        value: openai

      - key: OPENAI_API_KEY
        sync: false

      - key: OPENAI_MODEL
        value: gpt-4o-mini

      - key: ANTHROPIC_API_KEY
        sync: false

      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-20250514

      - key: CORS_ORIGINS
        sync: false

      - key: DATABASE_URL
        fromDatabase:
          name: nexus-ai-db
          property: connectionString

databases:
  - name: nexus-ai-db
    plan: free
    region: oregon
